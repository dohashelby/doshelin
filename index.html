<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doshelin — 도슐랭 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0c;
  --surface: #151515;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #ede9e0;
  --muted: #6b6860;
  --muted2: #9a9690;
  --accent: #c8102e;
  --star: #f5c518;
  --accent-dim: rgba(212,168,67,0.12);
  --ff-display: 'Bebas Neue', sans-serif;
  --ff-body: 'Noto Serif KR', serif;
  --ff-mono: 'DM Mono', monospace;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--ff-body); min-height: 100vh; }

header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(12,12,12,0.94); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(1rem,5vw,3.5rem); height: 56px;
}
.logo { font-family: var(--ff-display); font-size: 26px; letter-spacing: 0.05em; color: var(--accent); text-decoration: none; cursor: pointer; background: none; border: none; padding: 0; }
.logo span { color: var(--text); }
.header-count { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

/* about modal */
.about-backdrop {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
  align-items: center; justify-content: center; padding: 2rem;
}
.about-backdrop.open { display: flex; }
.about-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 4px; max-width: 480px; width: 100%;
  padding: 2.5rem; position: relative;
  animation: slideIn 0.2s ease both;
}
.about-close {
  position: absolute; top: 14px; right: 14px;
  background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer;
  line-height: 1; padding: 2px 6px;
}
.about-close:hover { color: var(--text); }
.about-title { font-family: var(--ff-display); font-size: 42px; color: var(--accent); letter-spacing: 0.04em; line-height: 1; margin-bottom: 0.5rem; }
.about-sub { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 1.5rem; }
.about-body { font-size: 14px; color: rgba(237,233,224,0.75); line-height: 2; }
.about-divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
.about-michelin { display: flex; flex-direction: column; gap: 10px; }
.am-row { display: flex; align-items: center; gap: 12px; }
.am-dots { display: flex; gap: 4px; flex-shrink: 0; width: 60px; }
.am-dot { font-size: 16px; color: var(--accent); }
.am-text { font-size: 13px; color: rgba(237,233,224,0.7); line-height: 1.5; }

.hero {
  padding: clamp(2.5rem,7vw,5rem) clamp(1rem,5vw,3.5rem) clamp(2rem,5vw,3.5rem);
  border-bottom: 1px solid var(--border);
}
.hero-eyebrow { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; }
.hero h1 { font-family: var(--ff-display); font-size: clamp(52px,9vw,110px); line-height: 0.88; letter-spacing: 0.02em; }
.hero h1 .accent { color: var(--accent); }

.controls {
  padding: 1rem clamp(1rem,5vw,3.5rem);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.filter-label { font-family: var(--ff-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; margin-right: 2px; }
.filter-btn {
  font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.06em;
  padding: 4px 13px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  border-radius: 2px; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.search-wrap { margin-left: auto; position: relative; }
.search-wrap input {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--ff-mono); font-size: 12px;
  padding: 6px 12px 6px 28px; border-radius: 2px; width: 190px; outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--border2); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 1px; background: var(--border);
}
.empty-state { grid-column: 1/-1; padding: 5rem; text-align: center; font-family: var(--ff-mono); font-size: 12px; color: var(--muted); }

.card {
  background: var(--bg); cursor: pointer; position: relative;
  animation: fadeUp 0.3s ease both; overflow: hidden;
  display: flex; flex-direction: column;
  transition: background 0.15s;
}
.card:hover { background: var(--surface); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.card-poster {
  width: 100%; aspect-ratio: 2/3; position: relative; overflow: hidden;
  background: var(--surface2);
}
.card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
.card:hover .card-poster img { transform: scale(1.04); }
.poster-fallback {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-display); font-size: 18px; color: var(--muted); letter-spacing: 0.06em;
  padding: 1rem; text-align: center;
}

.michelin-overlay {
  position: absolute; top: 8px; right: 8px;
  display: flex; flex-direction: row; gap: 2px; align-items: center;
}
.mo-star {
  width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #0c0c0c; line-height: 1;
}

.card-body { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.card-meta { font-family: var(--ff-mono); font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }
.card-title { font-family: var(--ff-display); font-size: 20px; letter-spacing: 0.02em; line-height: 1.05; }
.card-original { font-size: 11px; color: var(--muted); font-style: italic; }
.card-tagline { font-size: 12px; color: var(--muted2); line-height: 1.5; flex: 1; margin-top: 2px; }
.card-footer { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.card-stars { display: flex; align-items: center; gap: 2px; }
.s { font-size: 11px; color: var(--muted); }
.s.on { color: var(--star); }
.s-num { font-family: var(--ff-mono); font-size: 10px; color: var(--muted); margin-left: 4px; }
.card-michelin { display: flex; align-items: center; gap: 5px; }
.cm-dots { display: flex; gap: 1px; }
.cm-dot { font-size: 14px; color: var(--accent); line-height: 1; }

/* MODAL */
.modal-backdrop {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
  overflow-y: auto; padding: clamp(0.5rem,3vw,2rem);
}
.modal-backdrop.open { display: block; }
.modal-inner { display: flex; align-items: flex-start; justify-content: center; min-height: 100%; padding: 1rem 0; }

.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 4px; width: 100%; max-width: 740px;
  animation: slideIn 0.22s ease both; position: relative; overflow: hidden;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

.modal-close {
  position: absolute; top: 14px; right: 14px; z-index: 10;
  background: rgba(0,0,0,0.7); border: 1px solid var(--border2); color: var(--text);
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(0,0,0,0.95); }

.modal-top { display: flex; }
.modal-poster-wrap { width: 200px; flex-shrink: 0; background: var(--surface2); min-height: 280px; }
.modal-poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.modal-poster-fallback {
  width: 100%; height: 100%; min-height: 280px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-display); font-size: 20px; color: var(--muted); padding: 1rem; text-align: center;
}

.modal-header { flex: 1; padding: 1.75rem 1.75rem 1.25rem; display: flex; flex-direction: column; gap: 8px; }
.modal-genre-row { font-family: var(--ff-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
.modal-title { font-family: var(--ff-display); font-size: clamp(26px,4vw,42px); letter-spacing: 0.02em; line-height: 1; }
.modal-original { font-size: 12px; color: var(--muted); font-style: italic; }
.modal-director { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); }

.modal-rating-block { display: flex; flex-direction: column; gap: 7px; margin-top: 4px; }
.modal-stars-row { display: flex; align-items: center; gap: 3px; }
.ms { font-size: 15px; color: var(--muted); }
.ms.on { color: var(--star); }
.ms-num { font-family: var(--ff-mono); font-size: 11px; color: var(--muted2); margin-left: 5px; }

.modal-michelin-row { display: flex; align-items: center; gap: 7px; }
.mm-dots { display: flex; gap: 2px; }
.mm-dot { font-size: 18px; color: var(--accent); line-height: 1; }

.modal-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; padding-top: 8px; }
.modal-tag { font-family: var(--ff-mono); font-size: 10px; padding: 2px 8px; border: 1px solid var(--border); color: var(--muted); border-radius: 2px; }

.modal-divider { height: 1px; background: var(--border); margin: 0; }
.modal-body { padding: 1.5rem 1.75rem 1.75rem; }
.modal-tagline {
  font-size: 14px; color: var(--muted2); font-style: italic;
  border-left: 2px solid var(--accent); padding-left: 12px;
  margin-bottom: 1.25rem; line-height: 1.6;
}
.modal-review { font-size: 14px; color: rgba(237,233,224,0.78); line-height: 2; white-space: pre-wrap; margin-bottom: 1.25rem; }

footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem clamp(1rem,5vw,3.5rem);
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
}
.footer-stat { font-family: var(--ff-display); font-size: 42px; color: var(--accent); line-height: 1; }
.footer-label { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); }
.footer-right { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); text-align: right; line-height: 1.9; }

@media (max-width: 520px) {
  .modal-top { flex-direction: column; }
  .modal-poster-wrap { width: 100%; min-height: 200px; max-height: 260px; }
  .search-wrap { margin-left: 0; width: 100%; }
  .search-wrap input { width: 100%; }
}
</style>
</head>
<body>

<header>
  <button class="logo" onclick="openAbout()">DO<span>SHELIN</span></button>
  <span class="header-count" id="headerCount">— 편</span>
</header>

<section class="hero">
  <p class="hero-eyebrow">DOSHELIN GUIDE</p>
  <h1>도슐랭<br><span class="accent">가이드</span></h1>
</section>

<div class="controls">
  <span class="filter-label">GENRE</span>
  <div id="filterBtns" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="제목 검색...">
  </div>
</div>


<main class="grid" id="grid"></main>

<footer>
  <div>
    <div class="footer-stat" id="footerCount">0</div>
    <div class="footer-label">편의 리뷰</div>
  </div>
</footer>

<!-- About Modal -->
<div class="about-backdrop" id="aboutBackdrop" onclick="closeAboutBackdrop(event)">
  <div class="about-box">
    <button class="about-close" onclick="closeAbout()">✕</button>
    <div class="about-title">DOSHELIN</div>
    <div class="about-sub">도슐랭 가이드 — PERSONAL GUIDE</div>
    <div class="about-body">
      미슐랭 가이드에서 영감을 받은 나만의 감상 아카이브입니다.<br>
      영화, 드라마, 애니메이션, 웹툰을 가리지 않고 보고 느낀 것들을 솔직하게 기록합니다.
    </div>
    <div class="about-divider"></div>
    <div class="about-michelin">
      <div class="am-row">
        <div class="am-dots"><span class="am-dot">✼</span></div>
        <div class="am-text">한 번쯤 볼 만한 작품. 시간이 아깝지 않다.</div>
      </div>
      <div class="am-row">
        <div class="am-dots"><span class="am-dot">✼</span><span class="am-dot">✼</span></div>
        <div class="am-text">적극 추천. 주변에 권하고 싶은 작품.</div>
      </div>
      <div class="am-row">
        <div class="am-dots"><span class="am-dot">✼</span><span class="am-dot">✼</span><span class="am-dot">✼</span></div>
        <div class="am-text">인생작. 이걸 보기 위해 살았다 싶은 작품.</div>
      </div>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
  <div class="modal-inner">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-top">
        <div class="modal-poster-wrap" id="modalPoster"></div>
        <div class="modal-header" id="modalHeader"></div>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<script>
let allReviews = [];
let activeGenre = '전체';
let searchQuery = '';
const FIXED_GENRES = ['전체', '영화', '드라마', '애니메이션', '웹툰'];

async function loadReviews() {
  try {
    const res = await fetch('reviews.json');
    if (!res.ok) throw new Error();
    allReviews = await res.json();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      '<div class="empty-state">⚠️ 로컬에서는 브라우저가 파일 로드를 막습니다.<br>GitHub Pages에 올리면 정상 동작합니다.<br><br>로컬 테스트: <code>npx serve .</code> 또는 VS Code Live Server 사용</div>';
    return;
  }
  document.getElementById('headerCount').textContent = allReviews.length + ' 편';
  document.getElementById('footerCount').textContent = allReviews.length;
  renderFilters();
  renderGrid();
}

function renderFilters() {
  document.getElementById('filterBtns').innerHTML = FIXED_GENRES.map(g =>
    `<button class="filter-btn${g === activeGenre ? ' active' : ''}" onclick="setGenre('${g}')">${g}</button>`
  ).join('');
}

function setGenre(g) { activeGenre = g; renderFilters(); renderGrid(); }

function getFiltered() {
  return allReviews.filter(r => {
    const gOk = activeGenre === '전체' || r.genre === activeGenre;
    const q = searchQuery.toLowerCase();
    const sOk = !q || r.title.toLowerCase().includes(q) || (r.originalTitle||'').toLowerCase().includes(q);
    return gOk && sOk;
  });
}

function renderStars(rating, cls) {
  return Array.from({length:5},(_,i) => {
    const n = i + 1;
    const on = rating >= n ? ' on' : (rating >= n - 0.5 ? ' on' : '');
    const ch = rating >= n ? '★' : (rating >= n - 0.5 ? '⯨' : '☆');
    return `<span class="${cls}${on}">${ch}</span>`;
  }).join('');
}

function doshStars(n, cls) {
  return Array.from({length:n}, () => `<span class="${cls}">✼</span>`).join('');
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>'; return; }
  grid.innerHTML = list.map((r, i) => `
    <article class="card" style="animation-delay:${i*0.04}s" onclick="openModal(${r.id})">
      <div class="card-poster">
        ${r.poster ? `<img src="${r.poster}" alt="${r.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="poster-fallback" style="${r.poster?'display:none':''}">
          ${r.title}
        </div>
        <div class="michelin-overlay">${doshStars(r.michelin, 'mo-star')}</div>
      </div>
      <div class="card-body">
        <div class="card-meta"><span>${r.genre}</span><span>${r.year}</span></div>
        <div class="card-title">${r.title}</div>
        ${r.originalTitle?`<div class="card-original">${r.originalTitle}</div>`:''}
        <div class="card-tagline">${r.tagline||''}</div>
        <div class="card-footer">
          <div class="card-stars">${renderStars(r.rating,'s')}<span class="s-num">${r.rating}</span></div>
          <div class="card-michelin">
            <div class="cm-dots">${doshStars(r.michelin, 'cm-dot')}</div>
          </div>
        </div>
      </div>
    </article>`
  ).join('');
}

function openModal(id) {
  const r = allReviews.find(x => x.id === id);
  if (!r) return;

  document.getElementById('modalPoster').innerHTML = r.poster
    ? `<img src="${r.poster}" alt="${r.title}" onerror="this.outerHTML='<div class=\\'modal-poster-fallback\\'>${r.title}</div>'">`
    : `<div class="modal-poster-fallback">${r.title}</div>`;

  document.getElementById('modalHeader').innerHTML = `
    <div class="modal-genre-row">${r.genre} · ${r.year}</div>
    <div class="modal-title">${r.title}</div>
    ${r.originalTitle?`<div class="modal-original">${r.originalTitle}</div>`:''}
    <div class="modal-director">감독: ${r.director||'—'}</div>
    <div class="modal-rating-block">
      <div class="modal-stars-row">${renderStars(r.rating,'ms')}<span class="ms-num">${r.rating} / 5</span></div>
      <div class="modal-michelin-row">
        <div class="mm-dots">${doshStars(r.michelin, 'mm-dot')}</div>
      </div>
    </div>
    <div class="modal-tags">${(r.tags||[]).map(t=>`<span class="modal-tag">${t}</span>`).join('')}</div>
  `;

  document.getElementById('modalBody').innerHTML = `
    ${r.tagline?`<div class="modal-tagline">${r.tagline}</div>`:''}
    <div class="modal-review">${r.review}</div>
  `;

  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop') ||
      e.target === document.querySelector('.modal-inner')) closeModal();
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function openAbout() {
  document.getElementById('aboutBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeAbout() {
  document.getElementById('aboutBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function closeAboutBackdrop(e) {
  if (e.target === document.getElementById('aboutBackdrop')) closeAbout();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeAbout(); } });
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; renderGrid(); });

loadReviews();
</script>
</body>
</html>
